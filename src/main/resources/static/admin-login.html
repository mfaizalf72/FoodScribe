<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodScribe - Admin Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .brand {
            text-align: center;
            margin-bottom: 30px;
        }
        .brand h2 {
            font-size: 28px;
            font-weight: 800;
            color: #e74c3c;
        }
        .brand p {
            color: #999;
            font-size: 14px;
            margin-top: 5px;
        }

        .admin-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            font-size: 28px;
            color: white;
        }

        .form-control {
            border-radius: 8px;
            padding: 12px 15px;
            border: 1px solid #ddd;
            font-size: 14px;
            transition: all 0.3s;
        }
        .form-control:focus {
            border-color: #e74c3c;
            box-shadow: 0 0 0 0.2rem rgba(231,76,60,0.15);
        }

        .input-group-text {
            background: #f8f9fa;
            border-color: #ddd;
            color: #e74c3c;
        }

        .btn-login {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
            border: none;
            padding: 13px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
            letter-spacing: 1px;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(231,76,60,0.4);
        }

        .alert-danger {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            border-radius: 8px;
            padding: 12px 15px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
        }

        .footer-text {
            text-align: center;
            margin-top: 20px;
            color: #999;
            font-size: 12px;
        }
        .footer-text span { color: #e74c3c; }
    </style>
</head>
<body>

<div class="login-container">
    <div class="login-card">

        <div class="brand">
            <div class="admin-icon">
                <i class="fas fa-user-shield"></i>
            </div>
            <h2>FoodScribe</h2>
            <p>Admin Login</p>
        </div>

        <div class="alert-danger" id="errorMsg"></div>

        <div class="mb-3">
            <label class="form-label fw-600">Username</label>
            <div class="input-group">
                <span class="input-group-text">
                    <i class="fas fa-user"></i>
                </span>
                <input type="text" class="form-control" id="username"
                       placeholder="Admin username">
            </div>
        </div>

        <div class="mb-4">
            <label class="form-label">Password</label>
            <div class="input-group">
                <span class="input-group-text">
                    <i class="fas fa-lock"></i>
                </span>
                <input type="password" class="form-control" id="password"
                       placeholder="Admin password">
            </div>
        </div>

        <button class="btn-login" onclick="adminLogin()">
            <i class="fas fa-sign-in-alt me-2"></i>LOGIN
        </button>

        <div class="footer-text">
            Copyright @ <span>FoodScribe</span> © 2024
        </div>

    </div>
</div>

<script>
    function adminLogin() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();

        if (!username || !password) {
            showError('Please enter username and password!');
            return;
        }

        // Simple admin check
        // In real app this would call /api/admin/login
        if (username === 'admin' && password === 'admin123') {
            localStorage.setItem('adminLoggedIn', 'true');
            window.location.href = 'admin-dashboard.html';
        } else {
            showError('Invalid username or password!');
        }
    }

    function showError(msg) {
        const el = document.getElementById('errorMsg');
        el.innerText = msg;
        el.style.display = 'block';
    }

    // Press Enter to login
    document.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') adminLogin();
    });
</script>

</body>
</html>
